<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICEBERG PARTNERS | News Terminal</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #f5f6f8;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-card-hover: #f0f2f5;
      --border: #e2e5ea;
      --border-accent: #c9cdd4;
      --text-primary: #1a1d23;
      --text-secondary: #5a6170;
      --text-muted: #8b919e;
      --accent-blue: #2563eb;
      --accent-orange: #d97706;
      --accent-green: #059669;
      --accent-red: #dc2626;
      --accent-purple: #7c3aed;
      --accent-cyan: #0891b2;
      --accent-ice: #2563eb;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ═══ TOP BAR ═══ */
    .top-bar {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .06);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #ffffff;
      font-family: 'JetBrains Mono', monospace;
    }

    .logo-text {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 3px;
    }

    .logo-sub {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--accent-ice);
      font-weight: 500;
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent-green);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      background: var(--accent-green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(16, 185, 129, .4);
      }

      50% {
        opacity: .6;
        box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
      }
    }

    .clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }

    .refresh-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 7px 16px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: 1px;
    }

    .refresh-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .refresh-btn.loading {
      color: var(--accent-orange);
      border-color: var(--accent-orange);
    }


    /* ═══ CONTROL BAR ═══ */
    .control-bar {
      padding: 16px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .search-input {
      flex: 1;
      max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 16px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      border-color: var(--accent-blue);
    }

    .stat-chips {
      display: flex;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .5px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .stat-chip:hover {
      border-color: var(--border-accent);
      background: var(--bg-card-hover);
    }

    .stat-chip.active {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(37, 99, 235, .06);
    }

    .stat-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-chip .num {
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ═══ DASHBOARD ═══ */
    .dashboard {
      padding: 28px 40px 40px;
      max-width: 1800px;
      margin: 0 auto;
    }

    /* ═══ CATEGORY SECTION ═══ */
    .cat-section {
      margin-bottom: 36px;
    }

    .cat-section.hidden {
      display: none;
    }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .cat-color-bar {
      width: 4px;
      height: 28px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .cat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .cat-sublabel {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 8px;
      font-weight: 400;
    }

    .cat-article-count {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .cat-see-all {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent-ice);
      cursor: pointer;
      letter-spacing: 1px;
      opacity: .7;
      transition: opacity .2s;
    }

    .cat-see-all:hover {
      opacity: 1;
    }

    .time-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0 6px;
    }

    .time-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1f2937;
    }

    .time-divider span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #6b7280;
      letter-spacing: 1.5px;
      white-space: nowrap;
    }

    /* ═══ CARD ROW ═══ */
    .card-row {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-behavior: smooth;
      padding-bottom: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .card-row::-webkit-scrollbar {
      height: 4px;
    }

    .card-row::-webkit-scrollbar-track {
      background: transparent;
    }

    .card-row::-webkit-scrollbar-thumb {
      background: #c9cdd4;
      border-radius: 2px;
    }

    /* ═══ NEWS CARD ═══ */
    .h-card {
      flex: 0 0 380px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 22px;
      cursor: pointer;
      transition: all .25s;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
    }

    .h-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, .08);
    }

    .h-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .h-source {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg-primary);
      color: var(--text-secondary);
    }

    .h-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .h-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text-primary);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .h-desc {
      font-size: 12.5px;
      line-height: 1.55;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .h-card-accent {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 10px 10px 0 0;
      opacity: 0;
      transition: opacity .25s;
    }

    .h-card:hover .h-card-accent {
      opacity: 1;
    }

    /* ═══ LEAD CARD ═══ */
    .lead-card {
      flex: 0 0 520px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px 28px;
      cursor: pointer;
      transition: all .25s;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }

    .lead-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, .08);
    }

    .lead-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 4px;
      display: inline-block;
      width: fit-content;
    }

    .lead-title {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text-primary);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .lead-desc {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .lead-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .lead-card .h-card-accent {
      height: 4px;
    }

    .lead-card:hover .h-card-accent {
      opacity: 1;
    }

    /* ═══ EXPANDED GRID ═══ */
    .expanded-grid {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .expanded-grid.show {
      display: grid;
    }

    .expanded-grid .h-card {
      flex: unset;
    }

    /* ═══ LOADING ═══ */
    .loading-skeleton {
      flex: 0 0 380px;
      min-height: 180px;
      background: linear-gradient(90deg, #f0f2f5 25%, #e8eaee 50%, #f0f2f5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .empty-row {
      flex: 0 0 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* ═══ SHARE BUTTON ═══ */
    .share-btn {
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all .15s;
      text-decoration: none;
    }

    .share-btn:hover {
      border-color: #2563eb;
      color: #2563eb;
      background: rgba(37, 99, 235, .06);
    }

    .pw-badge {
      font-size: 10px;
      margin-left: 4px;
      cursor: help;
    }

    /* ═══ TICKER STRIP ═══ */
    .ticker-strip {
      background: #111827;
      overflow: hidden;
      white-space: nowrap;
      padding: 7px 0;
      position: relative;
    }

    .ticker-track {
      display: flex;
      animation: tickerScroll 45s linear infinite;
      width: max-content;
    }

    .ticker-track:hover {
      animation-play-state: paused;
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 22px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      border-right: 1px solid #1f2937;
    }

    .ticker-label {
      color: #9ca3af;
      font-size: 10px;
      letter-spacing: 0.5px;
    }

    .ticker-value {
      color: #f3f4f6;
      font-weight: 600;
    }

    .ticker-change {
      font-size: 10px;
      font-weight: 500;
    }

    .ticker-change.up {
      color: #34d399;
    }

    .ticker-change.down {
      color: #f87171;
    }

    .ticker-change.flat {
      color: #6b7280;
    }

    .ticker-tag {
      font-size: 7px;
      color: #4b5563;
      letter-spacing: 0.5px;
      border: 1px solid #374151;
      border-radius: 3px;
      padding: 1px 4px;
      margin-left: 2px;
    }

    @keyframes tickerScroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    /* ═══ FOOTER ═══ */
    .footer {
      border-top: 1px solid var(--border);
      padding: 20px 40px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 900px) {

      .top-bar,
      .control-bar,
      .dashboard,
      .footer {
        padding-left: 16px;
        padding-right: 16px;
      }

      .h-card {
        flex: 0 0 300px;
      }

      .lead-card {
        flex: 0 0 340px;
      }

      .stat-chips {
        display: none;
      }

      .expanded-grid {
        grid-template-columns: 1fr;
      }
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: #f0f2f5;
    }

    ::-webkit-scrollbar-thumb {
      background: #c9cdd4;
      border-radius: 3px;
    }
  </style>
</head>

    // ── 10Y UST via FRED CSV (official US Treasury data) ──
    function parseFredCsv(text) {
      // Handle base64-encoded response
      if (text.startsWith('data:')) {
        try { text = atob(text.split(',')[1]); } catch (e) { return null; }
      }
      const lines = text.trim().split('\n').filter(l => {
        const v = l.split(',')[1];
        return v && !isNaN(parseFloat(v)) && !l.startsWith('observation');
      });
      if (!lines.length) return null;
      const val = parseFloat(lines[lines.length - 1].split(',')[1]);
      return isNaN(val) ? null : val;
    }

    function parseRssXml(xmlText, source, catId) {
      try {
        const doc = globalParser.parseFromString(xmlText, 'text/xml');
        const items = doc.querySelectorAll('item');
        if (items.length === 0) {
          // Try Atom format
          const entries = doc.querySelectorAll('entry');
          return Array.from(entries).slice(0, 15).map(entry => {
            const title = entry.querySelector('title')?.textContent || '';
            const link = entry.querySelector('link')?.getAttribute('href') || entry.querySelector('link')?.textContent || '#';
            const desc = entry.querySelector('summary')?.textContent || entry.querySelector('content')?.textContent || '';
            const dateStr = entry.querySelector('published')?.textContent || entry.querySelector('updated')?.textContent || '';
            let pubDate = new Date(dateStr);
            if (isNaN(pubDate)) pubDate = new Date();
            return { title, description: stripHtml(desc), link, pubDate, source, category: catId };
          });
        }
        return Array.from(items).slice(0, 15).map(item => {
          let title = item.querySelector('title')?.textContent || '';
          const link = item.querySelector('link')?.textContent || '#';
          const desc = item.querySelector('description')?.textContent || item.getElementsByTagName('content:encoded')[0]?.textContent || '';
          const dateStr = item.querySelector('pubDate')?.textContent || item.getElementsByTagName('dc:date')[0]?.textContent || '';
          let pubDate = new Date(dateStr);
          if (isNaN(pubDate)) pubDate = new Date();
          // Google News RSS: <source> 태그에서 실제 매체명 추출
          const realSource = item.querySelector('source')?.textContent || '';
          let displaySource = source;
          // 제목 끝 " - Source Name" 패턴은 항상 제거 (Google News 표준 형식)
          const dashMatch = title.match(/\s-\s([^-]+)$/);
          if (dashMatch) {
            if (!realSource) displaySource = dashMatch[1].trim();
            title = title.replace(/\s-\s[^-]+$/, '').trim();
          }
          if (realSource) {
            displaySource = realSource.replace(/\.com$|\.org$|\.gov$|\.net$/i, '').trim();
          }
          return { title, description: stripHtml(desc), link: link.trim(), pubDate, source: displaySource, category: catId };
        });
      } catch (e) {
        console.warn(`[PARSE] XML parse error for ${source}:`, e);
        return [];
      }
    }

    function stripHtml(html) {
      if (!html) return '';
      try {
        const doc = globalParser.parseFromString(html, 'text/html');
        return (doc.body.textContent || '').trim();
      } catch (e) {
        return '';
      }
    }

    function escapeHTML(str) {
      if (typeof str !== 'string') return '';
      return str.replace(/[&<>'"]/g, match => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[match]));
    }

    async function fetchFeedViaProxy(feedUrl, source, catId) {
      // Strategy 1: Try rss2json first (fast when it works)
      try {
        const r = await fetch(RSS2JSON(feedUrl), { signal: getTimeoutSignal(8000) });
        if (r.ok) {
          const d = await r.json();
          if (d.status === 'ok' && d.items && d.items.length > 0) {
            return d.items.map(item => {
              let pubDate = new Date(item.pubDate);
              if (isNaN(pubDate)) pubDate = new Date();
              let title = item.title || '';
              // Google News 제목에서 실제 매체명 추출 " - Source Name"
              let displaySource = source;
              const dashMatch = title.match(/\s-\s([^-]+)$/);
              if (dashMatch) {
                displaySource = dashMatch[1].trim();
                title = title.replace(/\s-\s[^-]+$/, '').trim();
              }
              return {
                title, description: stripHtml(item.description || item.content || ''),
                link: item.link || '#', pubDate, source: displaySource, category: catId
              };
            });
          }
        }
      } catch (e) { /* fall through */ }

      // Strategy 2: Try CORS proxies
      for (const makeUrl of PROXIES) {
        try {
          const r = await fetch(makeUrl(feedUrl), { signal: getTimeoutSignal(10000) });
          if (!r.ok) continue;
          const text = await r.text();
          if (!text.includes('<') || text.length < 100) continue;
          const articles = parseRssXml(text, source, catId);
          if (articles.length > 0) return articles;
        } catch (e) { continue; }
      }

      console.warn(`[FEED] All strategies failed for ${source} (${feedUrl})`);
      return [];
    }

    async function fetchAllFeeds() {
      if (isFetching) return;
      isFetching = true;

      const btn = document.getElementById('refreshBtn');
      btn.classList.add('loading'); btn.textContent = '⟳ LOADING...';

      failedFeeds = [];
      let totalLoaded = 0;

      // 동적 after: 날짜 계산 (7일 전)
      const sevenDaysAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
      const afterDate = sevenDaysAgo.toISOString().slice(0, 10); // YYYY-MM-DD

      try {
        const tasks = [];
        CATEGORIES.forEach(cat => {
          cat.feeds.forEach(f => {
            tasks.push(async () => {
              try {
                // Google News RSS URL에 after: 파라미터 동적 추가
                let feedUrl = f.url;
                if (feedUrl.includes('news.google.com/rss/search')) {
                  const sep = feedUrl.includes('?q=') ? '+' : '&q=';
                  feedUrl = feedUrl.replace(/(\?q=)/, `$1after:${afterDate}+`);
                }
                const newArticles = await fetchFeedViaProxy(feedUrl, f.source, cat.id);
                if (newArticles && newArticles.length > 0) {
                  // 7일 이내 기사만
                  const MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000;
                  const now = Date.now();
                  const fresh = newArticles.filter(a => (now - a.pubDate.getTime()) < MAX_AGE_MS);

                  let existing = articlesByCategory[cat.id] || [];
                  existing = existing.filter(a => (now - a.pubDate.getTime()) < MAX_AGE_MS);

                  const combined = [...fresh, ...existing];
                  combined.sort((a, b) => b.pubDate - a.pubDate);

                  // 유사도 기반 중복 제거 (같은 사건 다른 매체 보도 감지)
                  articlesByCategory[cat.id] = deduplicateArticles(combined);

                  totalLoaded += newArticles.length;
                  debouncedRender();
                } else {
                  failedFeeds.push(f.source);
                }
              } catch (e) {
                failedFeeds.push(f.source);
              }
            });
          });
        });

        const limit = 8;
        const running = new Set();
        for (const task of tasks) {
          const p = task().finally(() => running.delete(p));
          running.add(p);
          if (running.size >= limit) {
            await Promise.race(running);
          }
        }
        await Promise.all(running);

        console.log(`[FEED] Loaded ${totalLoaded} new articles` + (failedFeeds.length ? ` | Failed: ${failedFeeds.join(', ')}` : ''));
      } finally {
        isFetching = false;
        btn.classList.remove('loading'); btn.textContent = '↻ REFRESH';
        document.getElementById('lastUpdated').textContent = new Date().toLocaleString('en-US', { hour: '2-digit', minute: '2-digit', month: 'short', day: 'numeric' });
        debouncedRender();
      }
    }

    // ══════════════════════════════════════════════════════════════
    // STAT CHIPS
    // ══════════════════════════════════════════════════════════════

    function renderStatChips() {
      const total = Object.values(articlesByCategory).reduce((s, a) => s + a.length, 0);
      let h = `<div class="stat-chip active" id="chip-all" onclick="scrollToSection('all')"><span class="num">${total}</span> TOTAL</div>`;
      CATEGORIES.forEach(c => {
        h += `<div class="stat-chip" id="chip-${c.id}" onclick="scrollToSection('${c.id}')"><span class="dot" style="background:${c.color}"></span><span class="num">${articlesByCategory[c.id].length}</span> ${c.label.split(' ')[0]}</div>`;
      });
      document.getElementById('statChips').innerHTML = h;
    }

    function scrollToSection(id) {
      document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active'));
      const chip = document.getElementById('chip-' + id);
      if (chip) chip.classList.add('active');

      if (id === 'all') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
      document.getElementById('section-' + id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ══════════════════════════════════════════════════════════════
    // RENDER
    // ══════════════════════════════════════════════════════════════

    function getTimeAgo(d) {
      let m = Math.floor((Date.now() - d.getTime()) / 60000);
      if (m < 0) m = 0;
      if (m < 60) return `${m}m`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h`;
      const dy = Math.floor(h / 24);
      return dy < 7 ? `${dy}d` : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    const PAYWALL_SOURCES = [
      // 주요 금융/비즈니스
      'wsj', 'wall street journal', 'bloomberg', 'financial times',
      'barrons', "barron's", 'economist', 'the information',
      'new york times', 'nytimes', 'washington post', 'business insider',
      'reuters breakingviews', 'the athletic', 'the telegraph',
      'fortune', 'forbes',
      // CRE / 부동산 전문
      'bisnow', 'commercial observer', 'the real deal', 'costar',
      'pere news', 'pere credit', 'perenews', 'perecredit',
      'institutional investor', 'pitchbook', 'trepp',
      'business journals', 'bizjournals', 'businessden',
      "crain's", 'crain', 'globest',
      // 기타 paywall/signup
      'politico', 'the daily beast', 'new yorker', 'vanity fair',
      'los angeles times', 'la times', 'chicago tribune',
      'boston globe', 'san francisco chronicle', 'sfchronicle',
      'dallas morning', 'houston chronicle', 'denver post',
      'the mercury news', 'seattle times',
      'marketplace', 'insider', 'business of business',
    ];
    function isPaywalled(source) {
      if (!source) return false;
      const s = source.toLowerCase();
      return PAYWALL_SOURCES.some(p => s.includes(p));
    }
    function openArticle(url, paywalled) {
      window.open(url, '_blank');
      if (paywalled) window.open('https://removepaywalls.com/', '_blank');
    }

    function shareArticle(title, url, btn) {
      if (btn.classList.contains('sending')) return;
      const origText = btn.textContent;
      btn.classList.add('sending');

      btn.textContent = '⏳';
      btn.style.color = '#d97706';
      btn.style.borderColor = '#d97706';

      emailjs.send('service_1n6w6bh', 'template_0grn3hr', {
        article_title: title,
        article_url: url
      }).then(() => {
        btn.textContent = '✓ SENT';
        btn.style.color = '#059669';
        btn.style.borderColor = '#059669';
        setTimeout(() => {
          btn.textContent = origText;
          btn.style.color = '';
          btn.style.borderColor = '';
          btn.classList.remove('sending');
        }, 2000);
      }).catch((err) => {
        console.error('EmailJS Error:', err);
        btn.textContent = '✗ FAIL';
        btn.style.color = '#dc2626';
        btn.style.borderColor = '#dc2626';
        setTimeout(() => {
          btn.textContent = origText;
          btn.style.color = '';
          btn.style.borderColor = '';
          btn.classList.remove('sending');
        }, 2000);
      });
    }

    function renderCard(a, cat, isLead) {
      const sl = a.link.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const dateStr = escapeHTML(a.pubDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }));
      const timeAgoStr = escapeHTML(getTimeAgo(a.pubDate));

      const safeTitle = escapeHTML(a.title);
      const rawDesc = a.description || '';
      const isLeadCut = rawDesc.length > 250;
      const isSmallCut = rawDesc.length > 140;
      const safeDescLead = escapeHTML(rawDesc.slice(0, 250)) + (isLeadCut ? '…' : '');
      const safeDescSmall = escapeHTML(rawDesc.slice(0, 140)) + (isSmallCut ? '…' : '');
      const safeSource = escapeHTML(a.source);
      const mailTitle = a.title.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const pw = isPaywalled(a.source);
      const pwBadge = pw ? '<span class="pw-badge" title="Paywall - removepaywalls.com will open">🔒</span>' : '';

      if (isLead) return `
    <div class="lead-card" onclick="openArticle('${sl}', ${pw})">
      <div class="h-card-accent" style="background:${cat.color}"></div>
      <div class="lead-label" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44">TOP · ${safeSource.toUpperCase()} ${pw ? '🔒' : ''}</div>
      <div class="lead-title">${safeTitle}</div>
      <div class="lead-desc">${safeDescLead}</div>
      <div class="lead-meta"><span>${safeSource}</span><span>·</span><span>${dateStr}</span><span>·</span><span>${timeAgoStr} ago</span><span class="share-btn" onclick="event.stopPropagation();shareArticle('${mailTitle}','${sl}',this)">✉ SHARE</span></div>
    </div>`;
      return `
    <div class="h-card" onclick="openArticle('${sl}', ${pw})">
      <div class="h-card-accent" style="background:${cat.color}"></div>
      <div class="h-card-top"><span class="h-source">${safeSource} ${pwBadge}</span><span class="share-btn" onclick="event.stopPropagation();shareArticle('${mailTitle}','${sl}',this)">✉</span><span class="h-time">${timeAgoStr}</span></div>
      <div class="h-title">${safeTitle}</div>
      <div class="h-desc">${safeDescSmall}</div>
    </div>`;
    }

    function renderDashboard() {
      const dash = document.getElementById('dashboard');
      const q = searchQuery.toLowerCase();
      let html = '';

      CATEGORIES.forEach(cat => {
        let articles = articlesByCategory[cat.id];
        if (q) articles = articles.filter(a => a.title.toLowerCase().includes(q) || a.description.toLowerCase().includes(q) || a.source.toLowerCase().includes(q));

        const isExp = expandedSections.has(cat.id);
        const hasMore = articles.length > 6;

        html += `<section class="cat-section${!articles.length && q ? ' hidden' : ''}" id="section-${cat.id}">
      <div class="cat-header">
        <div class="cat-color-bar" style="background:${cat.color}"></div>
        <div class="cat-label" style="color:${cat.color}">${cat.label}</div>
        <div class="cat-sublabel">${cat.sub}</div>
        <div class="cat-article-count">${articles.length} articles</div>
        ${hasMore ? `<div class="cat-see-all" onclick="toggleExpand('${cat.id}')">${isExp ? '◂ COLLAPSE' : 'SEE ALL ▸'}</div>` : ''}
      </div>`;

        if (!articles.length) {
          html += `<div class="card-row"><div class="empty-row">${q ? 'NO MATCHES' : (isFetching ? 'LOADING…' : 'NO ARTICLES FOUND')}</div></div>`;
        } else {
          const DAY_MS = 24 * 60 * 60 * 1000;
          const nowMs = Date.now();
          const today = articles.filter(a => (nowMs - a.pubDate.getTime()) < DAY_MS);
          const earlier = articles.filter(a => (nowMs - a.pubDate.getTime()) >= DAY_MS);

          if (!isExp) {
            // 축소 모드: TODAY 우선 6개, 부족하면 EARLIER로 채움
            const preview = [...today, ...earlier].slice(0, 6);
            html += `<div class="card-row">${preview.map((a, i) => renderCard(a, cat, i === 0)).join('')}</div>`;
          } else {
            // 확장 모드: TODAY / EARLIER 구분 표시
            if (today.length) {
              html += `<div class="time-divider"><span>TODAY</span></div>`;
              html += `<div class="expanded-grid show">${today.map(a => renderCard(a, cat, false)).join('')}</div>`;
            }
            if (earlier.length) {
              html += `<div class="time-divider"><span>EARLIER THIS WEEK</span></div>`;
              html += `<div class="expanded-grid show">${earlier.map(a => renderCard(a, cat, false)).join('')}</div>`;
            }
          }
        }
        html += `</section>`;
      });
      dash.innerHTML = html;
    }

    function toggleExpand(id) { expandedSections.has(id) ? expandedSections.delete(id) : expandedSections.add(id); renderDashboard(); }

    let searchTimer = null;
    function handleSearch() {
      if (searchTimer) clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = document.getElementById('searchInput').value.trim();
        renderDashboard();
      }, 150);
    }

    function refreshAll() { fetchAllFeeds(); }

    // Auto-refresh every 10 min
    setInterval(fetchAllFeeds, 10 * 60 * 1000);

    // INIT
    loadCache();
    fetchAllFeeds();
  </script>
</body>
