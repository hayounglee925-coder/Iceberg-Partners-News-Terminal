let articlesByCategory = {};

// ══════════════════════════════════════════════════════════════
// RSS FETCH — multi-strategy with fallbacks
// ══════════════════════════════════════════════════════════════

function getTimeoutSignal(ms) {
  try {
    if (AbortSignal.timeout) return AbortSignal.timeout(ms);
  } catch(e) {}
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), ms);
  return ctrl.signal;
}

function parseRssXml(xmlText, source, catId) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');
    const items = doc.querySelectorAll('item');
    if (items.length === 0) {
      // Try Atom format
      const entries = doc.querySelectorAll('entry');
      return Array.from(entries).slice(0, 15).map(entry => {
        const title = entry.querySelector('title')?.textContent || '';
        const link = entry.querySelector('link')?.getAttribute('href') || entry.querySelector('link')?.textContent || '#';
        const desc = entry.querySelector('summary')?.textContent || entry.querySelector('content')?.textContent || '';
        const dateStr = entry.querySelector('published')?.textContent || entry.querySelector('updated')?.textContent || '';
        let pubDate = new Date(dateStr);
        if (isNaN(pubDate)) pubDate = new Date();
        return { title, description: stripHtml(desc), link, pubDate, source, category: catId };
      });
    }
    return Array.from(items).slice(0, 15).map(item => {
      const title = item.querySelector('title')?.textContent || '';
      const link = item.querySelector('link')?.textContent || '#';
      const desc = item.querySelector('description')?.textContent || item.getElementsByTagName('content:encoded')[0]?.textContent || '';
      const dateStr = item.querySelector('pubDate')?.textContent || item.getElementsByTagName('dc:date')[0]?.textContent || '';
      let pubDate = new Date(dateStr);
      if (isNaN(pubDate)) pubDate = new Date();
      return { title, description: stripHtml(desc), link: link.trim(), pubDate, source, category: catId };
    });
  } catch (e) {
    console.warn(`[PARSE] XML parse error for ${source}:`, e);
    return [];
  }
}

function stripHtml(html) {
  if (!html) return '';
  try {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    return (doc.body.textContent || '').trim();
  } catch(e) {
    return '';
  }
}

function escapeHTML(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/[&<>'"]/g, match => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
  }[match]));
}

async function fetchFeedViaProxy(feedUrl, source, catId) {
  // Strategy 1: Try rss2json first (fast when it works)
  try {
    const r = await fetch(RSS2JSON(feedUrl), { signal: getTimeoutSignal(8000) });
    if (r.ok) {
      const d = await r.json();
      if (d.status === 'ok' && d.items && d.items.length > 0) {
        return d.items.map(item => {
          let pubDate = new Date(item.pubDate);
          if (isNaN(pubDate)) pubDate = new Date();
          return {
            title: item.title || '', description: stripHtml(item.description || item.content || ''),
            link: item.link || '#', pubDate, source, category: catId
          };
        });
      }
    }
  } catch (e) { /* fall through */ }

  // Strategy 2: Try CORS proxies
  for (const makeUrl of PROXIES) {
    try {
      const r = await fetch(makeUrl(feedUrl), { signal: getTimeoutSignal(10000) });
      if (!r.ok) continue;
      const text = await r.text();
      if (!text.includes('<') || text.length < 100) continue;
      const articles = parseRssXml(text, source, catId);
      if (articles.length > 0) return articles;
    } catch (e) { continue; }
  }

  console.warn(`[FEED] All strategies failed for ${source} (${feedUrl})`);
  return [];
}

// LocalStorage Persistence
const CACHE_KEY = 'iceberg_news_cache_v2';
function saveCache() {
  try {
    const toSave = {};
    CATEGORIES.forEach(c => toSave[c.id] = (articlesByCategory[c.id] || []).slice(0, 30));
    localStorage.setItem(CACHE_KEY, JSON.stringify(toSave));
  } catch(e) {}
}

function loadCache() {
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      const data = JSON.parse(cached);
      CATEGORIES.forEach(c => {
         if (data[c.id]) {
           articlesByCategory[c.id] = data[c.id].map(a => ({...a, pubDate: new Date(a.pubDate)}));
         }
      });
      renderStatChips();
      renderDashboard();
    }
  } catch(e) {}
}

let renderTimer = null;
function debouncedRender() {
  if (renderTimer) clearTimeout(renderTimer);
  renderTimer = setTimeout(() => {
    renderStatChips();
    renderDashboard();
    saveCache();
  }, 150);
}

let failedFeeds = [];

async function fetchAllFeeds() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading'); btn.textContent = '⟳ LOADING...';

  failedFeeds = [];
  let totalLoaded = 0;
  
  const tasks = [];
  CATEGORIES.forEach(cat => {
    cat.feeds.forEach(f => {
      tasks.push(async () => {
        try {
          const newArticles = await fetchFeedViaProxy(f.url, f.source, cat.id);
          if (newArticles && newArticles.length > 0) {
            let existing = articlesByCategory[cat.id] || [];
            const combined = [...newArticles];
            const newKeys = new Set(combined.map(a => a.title.toLowerCase().trim().slice(0, 60)));
            existing.forEach(old => {
              const k = old.title.toLowerCase().trim().slice(0, 60);
              if (!newKeys.has(k)) { combined.push(old); newKeys.add(k); }
            });
            combined.sort((a, b) => b.pubDate - a.pubDate);
            
            const seen = new Set();
            articlesByCategory[cat.id] = combined.filter(a => {
              const k = a.title.toLowerCase().trim().slice(0, 60);
              if (seen.has(k)) return false;
              seen.add(k); return true;
            });

            totalLoaded += newArticles.length;
            debouncedRender();
          } else {
            failedFeeds.push(f.source);
          }
        } catch (e) {
          failedFeeds.push(f.source);
        }
      });
    });
  });

  const limit = 8;
  const running = new Set();
  for (const task of tasks) {
    const p = task().finally(() => running.delete(p));
    running.add(p);
    if (running.size >= limit) {
      await Promise.race(running);
    }
  }
  await Promise.all(running);

  btn.classList.remove('loading'); btn.textContent = '↻ REFRESH';
  document.getElementById('lastUpdated').textContent = new Date().toLocaleString('en-US', { hour:'2-digit', minute:'2-digit', month:'short', day:'numeric' });
  console.log(`[FEED] Loaded ${totalLoaded} new articles` + (failedFeeds.length ? ` | Failed: ${failedFeeds.join(', ')}` : ''));
  debouncedRender();
}

function renderStatChips() {
  const total = Object.values(articlesByCategory).reduce((s, a) => s + a.length, 0);
  let h = `<div class="stat-chip active" id="chip-all" onclick="scrollToSection('all')"><span class="num">${total}</span> TOTAL</div>`;
  CATEGORIES.forEach(c => {
    h += `<div class="stat-chip" id="chip-${c.id}" onclick="scrollToSection('${c.id}')"><span class="dot" style="background:${c.color}"></span><span class="num">${articlesByCategory[c.id].length}</span> ${c.label.split(' ')[0]}</div>`;
  });
  document.getElementById('statChips').innerHTML = h;
}

function scrollToSection(id) {
  document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active'));
  const chip = document.getElementById('chip-' + id);
  if (chip) chip.classList.add('active');

  if (id === 'all') { window.scrollTo({ top:0, behavior:'smooth' }); return; }
  document.getElementById('section-'+id)?.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════

function getTimeAgo(d) {
  let m = Math.floor((Date.now() - d.getTime()) / 60000);
  if (m < 0) m = 0;
  if (m < 60) return `${m}m`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h`;
  const dy = Math.floor(h / 24);
  return dy < 7 ? `${dy}d` : d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function openArticle(url) {
  window.open(url, '_blank');
}

function renderCard(a, cat, isLead) {
  const sl = a.link.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
  const dateStr = escapeHTML(a.pubDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}));
  const timeAgoStr = escapeHTML(getTimeAgo(a.pubDate));
  
  const safeTitle = escapeHTML(a.title);
  const rawDesc = a.description || '';
  const isLeadCut = rawDesc.length > 250;
  const isSmallCut = rawDesc.length > 140;
  const safeDescLead = escapeHTML(rawDesc.slice(0, 250)) + (isLeadCut ? '…' : '');
  const safeDescSmall = escapeHTML(rawDesc.slice(0, 140)) + (isSmallCut ? '…' : '');
  const safeSource = escapeHTML(a.source);

  if (isLead) return `
    <div class="lead-card" onclick="openArticle('${sl}')">
      <div class="h-card-accent" style="background:${cat.color}"></div>
      <div class="lead-label" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44">TOP · ${safeSource.toUpperCase()}</div>
      <div class="lead-title">${safeTitle}</div>
      <div class="lead-desc">${safeDescLead}</div>
      <div class="lead-meta"><span>${safeSource}</span><span>·</span><span>${dateStr}</span><span>·</span><span>${timeAgoStr} ago</span></div>
    </div>`;
  return `
    <div class="h-card" onclick="openArticle('${sl}')">
      <div class="h-card-accent" style="background:${cat.color}"></div>
      <div class="h-card-top"><span class="h-source">${safeSource}</span><span class="h-time">${timeAgoStr}</span></div>
      <div class="h-title">${safeTitle}</div>
      <div class="h-desc">${safeDescSmall}</div>
    </div>`;
}

function renderDashboard() {
  const dash = document.getElementById('dashboard');
  const q = searchQuery.toLowerCase();
  let html = '';

  CATEGORIES.forEach(cat => {
    let articles = articlesByCategory[cat.id];
    if (q) articles = articles.filter(a => a.title.toLowerCase().includes(q) || a.description.toLowerCase().includes(q) || a.source.toLowerCase().includes(q));

    const isExp = expandedSections.has(cat.id);
    const hasMore = articles.length > 6;

    html += `<section class="cat-section${!articles.length && q ? ' hidden' : ''}" id="section-${cat.id}">
      <div class="cat-header">
        <div class="cat-color-bar" style="background:${cat.color}"></div>
        <div class="cat-label" style="color:${cat.color}">${cat.label}</div>
        <div class="cat-sublabel">${cat.sub}</div>
        <div class="cat-article-count">${articles.length} articles</div>
        ${hasMore ? `<div class="cat-see-all" onclick="toggleExpand('${cat.id}')">${isExp ? '◂ COLLAPSE' : 'SEE ALL ▸'}</div>` : ''}
      </div>`;

    if (!articles.length) {
      html += `<div class="card-row"><div class="empty-row">${q ? 'NO MATCHES' : 'LOADING…'}</div></div>`;
    } else if (!isExp) {
      html += `<div class="card-row">${articles.slice(0,6).map((a,i) => renderCard(a,cat,i===0)).join('')}</div>`;
    } else {
      html += `<div class="expanded-grid show">${articles.map(a => renderCard(a,cat,false)).join('')}</div>`;
    }
    html += `</section>`;
  });
  dash.innerHTML = html;
}

function toggleExpand(id) { expandedSections.has(id) ? expandedSections.delete(id) : expandedSections.add(id); renderDashboard(); }
function handleSearch() { searchQuery = document.getElementById('searchInput').value.trim(); renderDashboard(); }
function refreshAll() { fetchAllFeeds(); }

// Auto-refresh every 10 min
setInterval(fetchAllFeeds, 10 * 60 * 1000);

loadCache();
